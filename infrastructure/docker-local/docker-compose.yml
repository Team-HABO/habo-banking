services:
  # ── Infrastructure ─────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - messaging

  postgres-account:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-account-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db-account

  postgres-transaction:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-transaction-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db-transaction

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval " try {
          if (rs.status().ok) {
            quit(0);
          }
        } catch (e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
          quit(1);
        }"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - db-mongo

  compass:
    image: haohanyang/compass-web
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - CW_MONGO_URI=mongodb://mongodb:27017
      - CW_ENABLE_SHELL=true
      - CW_MASTER_PASSWORD=changeme
    networks:
      - db-mongo
    depends_on:
      mongodb:
        condition: service_healthy

  # ── Application Services ───────────────────────────────────────

  service-account-app:
    build:
      context: ../../services/service-account
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ../../services/service-account:/app:cached
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres-account
      POSTGRES_DB: account_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    networks:
      - db-account
      - messaging
      - monitoring
    depends_on:
      postgres-account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  service-account-consumer:
    build:
      context: ../../services/service-account
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ../../services/service-account:/app:cached
    command: python manage.py consume_events
    environment:
      POSTGRES_HOST: postgres-account
      POSTGRES_DB: account_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - db-account
      - messaging
      - monitoring
    depends_on:
      postgres-account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  service-ai:
    build:
      context: ../../services/service-ai
      dockerfile: Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    networks:
      - messaging
      - monitoring
    depends_on:
      rabbitmq:
        condition: service_healthy

  service-notification:
    build:
      context: ../../services/service-notification
      dockerfile: Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    networks:
      - messaging
      - monitoring
    depends_on:
      rabbitmq:
        condition: service_healthy

  service-currency-exchange:
    build:
      context: ../../services/service-currency-exchange
      dockerfile: Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - messaging
      - monitoring
    depends_on:
      rabbitmq:
        condition: service_healthy

  service-transaction:
    build:
      context: ../../services/service-transaction
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-transaction:5432/transaction_db?schema=public
      RABBITMQ_HOST: rabbitmq
    networks:
      - db-transaction
      - messaging
      - monitoring
    depends_on:
      postgres-transaction:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  service-synchronize:
    build:
      context: ../../services/service-synchronize
      dockerfile: Dockerfile
      target: build
    working_dir: /src
    command:
      ["dotnet", "watch", "run", "--project", "service-synchronize.csproj"]
    environment:
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ../../services/service-synchronize/service-synchronize:/src
      - synchronize-bin:/src/bin
      - synchronize-obj:/src/obj
      - synchronize-nuget:/root/.nuget/packages
    restart: unless-stopped
    networks:
      - db-mongo
      - messaging
      - monitoring
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  service-view:
    build:
      context: ../../services/service-view
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/HABO_DB?replicaSet=rs0&directConnection=true
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 4000
      JWT_SECRET: ${SECRET_KEY_JWT}
    restart: unless-stopped
    networks:
      - db-mongo
      - frontend
      - monitoring
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  service-auth:
    build:
      context: ../../services/service-auth
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      SecretKeyJwt: ${SECRET_KEY_JWT}
      AuthServiceUrl: http://localhost:8080
      FrontendUrl: http://localhost:3000
      AccountServiceUrl: http://localhost:8000
      BalanceServiceUrl: http://localhost:4000
    networks:
      - frontend
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  service-frontend:
    build:
      context: ../../services/service-frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: http://localhost:8080
        VITE_ACCOUNT_API_URL: http://localhost:8000
        VITE_VIEW_API_URL: http://localhost:4000
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - frontend
      - monitoring
    depends_on:
      - service-auth
      - service-account-app

  # ── Observability ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - monitoring
    depends_on:
      - service-ai

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - monitoring
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - loki

networks:
  db-account:
    driver: bridge
  db-transaction:
    driver: bridge
  db-mongo:
    driver: bridge
  messaging:
    driver: bridge
  monitoring:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres-account-data:
  postgres-transaction-data:
  mongodb-data:
  synchronize-bin:
  synchronize-obj:
  synchronize-nuget:
  loki-data:
  grafana-data:
  prometheus-data:
