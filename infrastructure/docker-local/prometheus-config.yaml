global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "service-ai"
    static_configs:
      - targets: ["service-ai:9091"]

  - job_name: "service-notification"
    static_configs:
      - targets: ["service-notification:9092"]

  - job_name: "service-currency-exchange"
    static_configs:
      - targets: ["service-currency-exchange:9093"]
