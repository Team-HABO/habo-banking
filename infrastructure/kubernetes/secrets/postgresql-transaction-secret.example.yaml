apiVersion: v1
kind: Secret
metadata:
  name: postgresql-transaction-secret
  namespace: habo-banking
type: Opaque
stringData:
  POSTGRES_USER: habouser
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB: habo_banking
  # Used by Prisma in service-transaction. Host must match the Service name.
  # secretlint-disable-next-line @secretlint/secretlint-rule-database-connection-string
  DATABASE_URL: postgresql://<POSTGRES_USER>:<POSTGRES_PASSWORD>@postgresql-transaction:5432/habo_banking?schema=public
