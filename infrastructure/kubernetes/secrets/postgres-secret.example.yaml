apiVersion: v1
kind: Secret
metadata:
    name: postgres-secret
    namespace: habo-banking
type: Opaque
stringData:
    POSTGRES_USER: habouser
    POSTGRES_PASSWORD: changeme
    POSTGRES_DB: habo_banking
    # Used by Prisma in service-transaction. Host must match the Service name.
    DATABASE_URL: postgresql://habouser:changeme@postgresql:5432/habo_banking?schema=public
