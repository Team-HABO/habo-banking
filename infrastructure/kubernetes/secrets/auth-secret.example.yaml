apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: habo-banking
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: your-google-client-id
  GOOGLE_CLIENT_SECRET: your-google-client-secret
  # Must be at least 32 characters. Shared with service-view for JWT verification.
  SECRET_KEY_JWT: changeme-use-a-long-random-string-here-min-32-chars
