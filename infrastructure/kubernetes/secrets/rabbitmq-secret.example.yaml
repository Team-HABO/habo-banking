apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: habo-banking
type: Opaque
stringData:
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest
  # Full management API URL — used by KEDA to poll queue depths.
  # Must use the cluster-internal FQDN so KEDA (in the keda namespace) can reach it.
  RABBITMQ_MANAGEMENT_URL: http://<RABBITMQ_USERNAME>:<RABBITMQ_PASSWORD>@rabbitmq.habo-banking.svc.cluster.local:15672
