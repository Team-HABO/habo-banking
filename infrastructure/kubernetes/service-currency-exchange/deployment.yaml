apiVersion: apps/v1
kind: Deployment
metadata:
    name: service-currency-exchange
    namespace: habo-banking
spec:
    replicas: 1
    selector:
        matchLabels:
            app: service-currency-exchange
    template:
        metadata:
            labels:
                app: service-currency-exchange
        spec:
            automountServiceAccountToken: false
            initContainers:
                # Wait for RabbitMQ to accept connections before starting the service.
                # Avoids MassTransit startup errors when the broker isn't ready yet.
                - name: wait-for-rabbitmq
                  image: busybox:1.37
                  command: ['sh', '-c', "until nc -z rabbitmq 5672; do echo 'waiting for rabbitmq...'; sleep 2; done"]
                  resources:
                      requests:
                          cpu: '10m'
                          memory: '16Mi'
                          ephemeral-storage: '16Mi'
                      limits:
                          cpu: '50m'
                          memory: '32Mi'
                          ephemeral-storage: '32Mi'
            containers:
                - name: service-currency-exchange
                  image: forkeh/habo-bank-service-currency-exchange:latest
                  imagePullPolicy: Always
                  env:
                      - name: RABBITMQ_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: RABBITMQ_HOST
                      - name: RABBITMQ_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_USERNAME
                      - name: RABBITMQ_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_PASSWORD
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                          ephemeral-storage: '256Mi'
                      limits:
                          cpu: '500m'
                          memory: '256Mi'
                          ephemeral-storage: '512Mi'
