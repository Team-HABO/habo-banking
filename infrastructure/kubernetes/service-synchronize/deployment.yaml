apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-synchronize
  namespace: habo-banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-synchronize
  template:
    metadata:
      labels:
        app: service-synchronize
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.37
          command:
            [
              "sh",
              "-c",
              "until nc -z mongodb 27017; do echo 'waiting for mongodb...'; sleep 2; done",
            ]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "32Mi"
        - name: wait-for-rabbitmq
          image: busybox:1.37
          command:
            [
              "sh",
              "-c",
              "until nc -z rabbitmq 5672; do echo 'waiting for rabbitmq...'; sleep 2; done",
            ]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "32Mi"
      containers:
        - name: service-synchronize
          image: olli4/habo-bank-service-synchronize:latest
          imagePullPolicy: Always
          env:
            - name: MONGODB_CONNECTION_STRING
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGODB_CONNECTION_STRING
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_HOST
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
