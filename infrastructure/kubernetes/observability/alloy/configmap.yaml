apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: habo-banking
data:
  config.alloy: |
    // Discover all pods in the habo-banking namespace via the Kubernetes API.
    // In Docker, this was done via the Docker socket; in Kubernetes we use the API instead.
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["habo-banking"]
      }
    }

    // Relabel targets: expose pod name, app label, namespace, and container as Loki labels
    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      // Mirror the docker-compose "service" label using the app label
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "service"
      }
    }

    // Stream logs from all discovered pods to Loki
    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.local.receiver]
    }

    // Push log entries to the Loki instance in the same namespace
    loki.write "local" {
      endpoint {
        url = "http://loki.habo-banking.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
