apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: habo-banking
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.habo-banking.svc.cluster.local:9090
        isDefault: false
        editable: false

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.habo-banking.svc.cluster.local:3100
        isDefault: true
        editable: false

  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: default
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/provisioning/dashboards

  services.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "row",
          "title": "Service Status",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": []
        },
        {
          "type": "stat",
          "title": "service-ai",
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 1 },
          "targets": [
            { "refId": "A", "expr": "up{job=\"service-ai\"}", "legendFormat": "service-ai" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "color": "red", "index": 1, "text": "DOWN" },
                    "1": { "color": "green", "index": 0, "text": "UP" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          }
        },
        {
          "type": "stat",
          "title": "service-notification",
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 1 },
          "targets": [
            { "refId": "A", "expr": "up{job=\"service-notification\"}", "legendFormat": "service-notification" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "color": "red", "index": 1, "text": "DOWN" },
                    "1": { "color": "green", "index": 0, "text": "UP" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          }
        },
        {
          "type": "stat",
          "title": "service-currency-exchange",
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 1 },
          "targets": [
            { "refId": "A", "expr": "up{job=\"service-currency-exchange\"}", "legendFormat": "service-currency-exchange" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "color": "red", "index": 1, "text": "DOWN" },
                    "1": { "color": "green", "index": 0, "text": "UP" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "wideLayout": true
          }
        },
        {
          "type": "row",
          "title": "CPU & Memory",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "CPU Usage",
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            { "refId": "A", "expr": "rate(process_cpu_seconds_total{job=\"service-ai\"}[1m])", "legendFormat": "service-ai" },
            { "refId": "B", "expr": "rate(process_cpu_seconds_total{job=\"service-notification\"}[1m])", "legendFormat": "service-notification" },
            { "refId": "C", "expr": "rate(process_cpu_seconds_total{job=\"service-currency-exchange\"}[1m])", "legendFormat": "service-currency-exchange" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        },
        {
          "type": "timeseries",
          "title": "Working Set Memory",
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            { "refId": "A", "expr": "process_working_set_bytes{job=\"service-ai\"}", "legendFormat": "service-ai" },
            { "refId": "B", "expr": "process_working_set_bytes{job=\"service-notification\"}", "legendFormat": "service-notification" },
            { "refId": "C", "expr": "process_working_set_bytes{job=\"service-currency-exchange\"}", "legendFormat": "service-currency-exchange" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        },
        {
          "type": "row",
          "title": "GC & Thread Pool",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "GC Collections / sec",
          "id": 9,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 15 },
          "targets": [
            { "refId": "A", "expr": "rate(dotnet_collection_count_total{job=\"service-ai\"}[1m])", "legendFormat": "{{generation}} (ai)" },
            { "refId": "B", "expr": "rate(dotnet_collection_count_total{job=\"service-notification\"}[1m])", "legendFormat": "{{generation}} (notif)" },
            { "refId": "C", "expr": "rate(dotnet_collection_count_total{job=\"service-currency-exchange\"}[1m])", "legendFormat": "{{generation}} (exchange)" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        },
        {
          "type": "timeseries",
          "title": "Thread Pool Threads",
          "id": 10,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 15 },
          "targets": [
            { "refId": "A", "expr": "system_runtime_threadpool_thread_count{job=\"service-ai\"}", "legendFormat": "service-ai" },
            { "refId": "B", "expr": "system_runtime_threadpool_thread_count{job=\"service-notification\"}", "legendFormat": "service-notification" },
            { "refId": "C", "expr": "system_runtime_threadpool_thread_count{job=\"service-currency-exchange\"}", "legendFormat": "service-currency-exchange" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        },
        {
          "type": "timeseries",
          "title": "Thread Pool Queue Length",
          "id": 11,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 15 },
          "targets": [
            { "refId": "A", "expr": "system_runtime_threadpool_queue_length{job=\"service-ai\"}", "legendFormat": "service-ai" },
            { "refId": "B", "expr": "system_runtime_threadpool_queue_length{job=\"service-notification\"}", "legendFormat": "service-notification" },
            { "refId": "C", "expr": "system_runtime_threadpool_queue_length{job=\"service-currency-exchange\"}", "legendFormat": "service-currency-exchange" }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        },
        {
          "type": "row",
          "title": "Logs",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "panels": []
        },
        {
          "type": "logs",
          "title": "service-ai Logs",
          "id": 13,
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 24 },
          "targets": [
            { "refId": "A", "expr": "{app=\"service-ai\"}", "datasource": { "type": "loki", "uid": "loki" } }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "type": "logs",
          "title": "service-notification Logs",
          "id": 14,
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "targets": [
            { "refId": "A", "expr": "{app=\"service-notification\"}", "datasource": { "type": "loki", "uid": "loki" } }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "type": "logs",
          "title": "service-currency-exchange Logs",
          "id": 15,
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 44 },
          "targets": [
            { "refId": "A", "expr": "{app=\"service-currency-exchange\"}", "datasource": { "type": "loki", "uid": "loki" } }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["habo-banking"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "habo-banking — Services",
      "uid": "habo-banking-services",
      "version": 1,
      "weekStart": ""
    }
