apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: habo-banking
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "service-ai"
        static_configs:
          - targets: ["service-ai-metrics.habo-banking.svc.cluster.local:9091"]

      - job_name: "service-notification"
        static_configs:
          - targets: ["service-notification-metrics.habo-banking.svc.cluster.local:9092"]

      - job_name: "service-currency-exchange"
        static_configs:
          - targets: ["service-currency-exchange-metrics.habo-banking.svc.cluster.local:9093"]
