apiVersion: apps/v1
kind: Deployment
metadata:
    name: service-notification
    namespace: habo-banking
spec:
    replicas: 1
    selector:
        matchLabels:
            app: service-notification
    template:
        metadata:
            labels:
                app: service-notification
        spec:
            initContainers:
                - name: wait-for-rabbitmq
                  image: busybox:1.37
                  command: ['sh', '-c', "until nc -z rabbitmq 5672; do echo 'waiting for rabbitmq...'; sleep 2; done"]
            containers:
                - name: service-notification
                  image: forkeh/habo-bank-service-notification:latest
                  imagePullPolicy: Always
                  env:
                      - name: RABBITMQ_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: RABBITMQ_HOST
                      - name: RABBITMQ_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_USERNAME
                      - name: RABBITMQ_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_PASSWORD
                      - name: SMTP_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: SMTP_HOST
                      - name: SMTP_PORT
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: SMTP_PORT
                      - name: SMTP_FROM_EMAIL
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: SMTP_FROM_EMAIL
                      - name: SMTP_FROM_NAME
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: SMTP_FROM_NAME
                      - name: SMTP_USERNAME
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: SMTP_USERNAME
                      - name: SMTP_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: SMTP_PASSWORD
                  resources:
                      requests:
                          cpu: '50m'
                          memory: '128Mi'
                      limits:
                          cpu: '250m'
                          memory: '256Mi'
