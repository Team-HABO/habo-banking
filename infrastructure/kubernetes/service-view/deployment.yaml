apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-view
  namespace: habo-banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-view
  template:
    metadata:
      labels:
        app: service-view
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.37
          command:
            [
              "sh",
              "-c",
              "until nc -z mongodb 27017; do echo 'waiting for mongodb...'; sleep 2; done",
            ]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "32Mi"
      containers:
        - name: service-view
          image: olli4/habo-bank-service-view:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: MONGODB_CONNECTION_STRING
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGODB_CONNECTION_STRING
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: "4000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: SECRET_KEY_JWT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
