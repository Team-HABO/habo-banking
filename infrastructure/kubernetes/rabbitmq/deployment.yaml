apiVersion: apps/v1
kind: Deployment
metadata:
    name: rabbitmq
    namespace: habo-banking
spec:
    replicas: 1
    selector:
        matchLabels:
            app: rabbitmq
    strategy:
        type: Recreate # Required for stateful workloads with PVCs
    template:
        metadata:
            labels:
                app: rabbitmq
        spec:
            containers:
                - name: rabbitmq
                  image: rabbitmq:3-management
                  ports:
                      - name: amqp
                        containerPort: 5672
                      - name: management
                        containerPort: 15672
                  env:
                      - name: RABBITMQ_DEFAULT_USER
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_USERNAME
                      - name: RABBITMQ_DEFAULT_PASS
                        valueFrom:
                            secretKeyRef:
                                name: rabbitmq-secret
                                key: RABBITMQ_PASSWORD
                  readinessProbe:
                      exec:
                          command: ['rabbitmq-diagnostics', '-q', 'ping']
                      initialDelaySeconds: 20
                      periodSeconds: 10
                      failureThreshold: 6
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '256Mi'
                      limits:
                          cpu: '500m'
                          memory: '512Mi'
                  volumeMounts:
                      - name: rabbitmq-data
                        mountPath: /var/lib/rabbitmq
            volumes:
                - name: rabbitmq-data
                  persistentVolumeClaim:
                      claimName: rabbitmq-pvc
