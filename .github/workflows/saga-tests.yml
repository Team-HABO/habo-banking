name: SAGA Compensation Tests

on:
    workflow_call:
    workflow_dispatch:
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Build and start services
              run: docker compose -f systems-tests/docker-compose.saga.yml up -d --build

            - name: Wait for service-account to be ready
              run: |
                  echo "Waiting for service-account HTTP to be ready..."
                  for i in $(seq 1 30); do
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/accounts/)
                    # 405 = Method Not Allowed (GET on POST-only endpoint) means Django is up
                    if [ "$STATUS" = "405" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
                      echo "service-account is ready (HTTP $STATUS)"
                      break
                    fi
                    echo "Attempt $i/30 — not ready yet (HTTP $STATUS), retrying in 2s..."
                    sleep 2
                  done

            - name: Wait for compensation consumer to bind its queue
              run: |
                  echo "Waiting for account-create-failed-queue to exist..."
                  for i in $(seq 1 30); do
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" -u guest:guest http://localhost:15672/api/queues/%2F/account-create-failed-queue)
                    if [ "$STATUS" = "200" ]; then
                      echo "Compensation consumer is ready (queue found)"
                      exit 0
                    fi
                    echo "Attempt $i/30 — queue not ready yet (HTTP $STATUS), retrying in 2s..."
                    sleep 2
                  done
                  echo "Timed out waiting for compensation consumer"
                  docker compose -f systems-tests/docker-compose.saga.yml logs
                  exit 1

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: systems-tests/package-lock.json

            - name: Install dependencies
              working-directory: systems-tests
              run: npm ci

            - name: Run SAGA compensation tests
              working-directory: systems-tests
              env:
                  POSTGRES_USER: testuser
                  POSTGRES_PASSWORD: testpassword
                  POSTGRES_DB: account_db
              run: npm run test:saga

            - name: Tear down services
              if: always()
              run: docker compose -f systems-tests/docker-compose.saga.yml down
