name: Dockerize
on:
  workflow_call:
    inputs:
      docker-image-name:
        description: "The name of the docker image to push"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        description: "The docker username to use for pushing the image"
        required: true
      DOCKER_PASSWORD:
        description: "The docker password to use for pushing the image"
        required: true
  workflow_dispatch:
    inputs:
      docker-image-name:
        description: "The name of the docker image to push"
        required: false
        default: "test-image"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || secrets.BRIAN_DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD || secrets.BRIAN_DOCKER_PASSWORD }}
      IMAGE_NAME: ${{ inputs.docker-image-name || 'test-image' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/service-ai
          push: true
          tags: |
            docker.io/${{ env.DOCKER_USERNAME }}/habo-bank-${{ env.IMAGE_NAME }}:latest
            docker.io/${{ env.DOCKER_USERNAME }}/habo-bank-${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
