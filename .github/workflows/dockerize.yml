name: Dockerize
on:
  workflow_call:
    inputs:
      docker-image-name:
        description: "The name of the docker image to push"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        description: "The docker username to use for pushing the image"
        required: true
      DOCKER_PASSWORD:
        description: "The docker password to use for pushing the image"
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: ${{ inputs.docker-image-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: services/${{ env.IMAGE_NAME }}
          push: true
          tags: |
            docker.io/${{ env.DOCKER_USERNAME }}/habo-bank-${{ env.IMAGE_NAME }}:latest
            docker.io/${{ env.DOCKER_USERNAME }}/habo-bank-${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
