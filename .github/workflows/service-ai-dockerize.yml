name: Service AI Dockerize
on:
  workflow_call:
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.BRIAN_DOCKER_USERNAME }}
          password: ${{ secrets.BRIAN_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/forkeh/habo-bank-service-ai:latest
            docker.io/forkeh/habo-bank-service-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max