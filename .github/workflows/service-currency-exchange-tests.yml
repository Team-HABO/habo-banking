name: Currency Exchange Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Run integration tests
        working-directory: "services/service-currency-exchange/service-currency-exchange.Tests.Integration"
        run: dotnet test --verbosity normal
