name: View Service tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_CONNECTION_STRING: mongodb://localhost:27018/HABO_DB?directConnection=true
      BASE_URL: http://127.0.0.1:4000
      JWT_SECRET: ${{ secrets.JWT_SECRET_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/service-view/package-lock.json

      - name: Install dependencies
        working-directory: services/service-view
        run: npm ci --include=dev --no-audit --no-fund

      - name: Build service
        working-directory: services/service-view
        run: npm run build

      - name: Start service-view
        working-directory: services/service-view
        run: |
          nohup npm start > /tmp/service-view.log 2>&1 &
          echo $! > /tmp/service-view.pid

      - name: Wait for service-view
        run: |
          curl --fail --silent --show-error --retry 30 --retry-all-errors --retry-delay 2 \
            -X POST "$BASE_URL/" \
            -H "Content-Type: application/json" \
            -H "Apollo-Require-Preflight: true" \
            --data '{"query":"{ __schema { queryType { name } } }"}' > /dev/null

      - name: Run resolver tests
        working-directory: services/service-view
        run: npm test -- tests/resolvers.test.ts

      - name: Seed MongoDB
        run: |
          mongosh "mongodb://localhost:27018/HABO_DB" <<EOF
          db.your_collection_name.insertOne({
            "_id": "Test",
            "accounts": [
              {
                "accountGuid": "my-guid",
                "type": "Savings",
                "name": "my savings",
                "timestamp": "2026-04-06T09:21:00Z",
                "isFrozen": false,
                "balance": {
                  "amount": NumberDecimal("650.00")
                },
                "audits": [
                  {
                    "auditId": "GUID",
                    "amount": "200.00",
                    "type": "Deposit",
                    "timestamp": "2026-04-06T09:22:00Z",
                    "sender": null,
                    "receiver": null
                  },
                  {
                    "auditId": "GUID2",
                    "amount": "500.00",
                    "type": "Deposit",
                    "timestamp": "2026-04-06T09:22:00Z",
                    "sender": null,
                    "receiver": null
                  },
                  {
                    "auditId": "GUID3",
                    "amount": "50.00",
                    "type": "Withdraw",
                    "timestamp": "2026-04-06T09:22:00Z",
                    "sender": null,
                    "receiver": null
                  }
                ]
              }
            ]
          })
          EOF

      - name: Run Newman tests
        run: |
          npx newman run "services/service-view/postman/service-view-GraphQL.postman_collection.json" \
          -e "services/service-view/postman/habo-banking-view.postman_environment.json" \
          --env-var "jwt_token=${{ secrets.OAUTH_TEST_JWT_TOKEN }}"


      - name: Report Coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: "services/service-view"

      - name: Show service log on failure
        if: failure()
        run: |
          if [ -f /tmp/service-view.log ]; then
            cat /tmp/service-view.log
          fi
