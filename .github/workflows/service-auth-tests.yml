name: AuthService tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore services/service-auth/test/test.csproj

      - name: Build
        run: dotnet build services/service-auth/test/test.csproj --configuration Release --no-restore

      - name: Test with Coverage
        run: dotnet test services/service-auth/test/test.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
        
      - name: Report Coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/TestResults/**/coverage.cobertura.xml"
          badge: true
          format: markdown
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md