name: Frontend CI

permissions:
  pull-requests: write

on:
  push:
    paths:
      - "services/service-frontend/**"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/service-frontend/**"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/frontend-tests.yml"
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/frontend-tests.yml

  dockerize:
    needs: run-tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/dockerize.yml
    with:
      docker-image-name: service-frontend
      build-args: |
        VITE_AUTH_API_URL=http://localhost:8080
        VITE_ACCOUNT_API_URL=http://localhost:8000
        VITE_VIEW_API_URL=http://localhost:4000
    secrets:
      DOCKER_USERNAME: ${{ secrets.ALI_DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.ALI_DOCKER_PASSWORD }}
