name: Frontend CI/CD

permissions:
  pull-requests: write

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - ".github/workflows/frontend-tests.yml"
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/frontend-tests.yml
  dockerize:
    needs: run-tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/dockerize.yml
    with:
      docker-image-name: frontend
    secrets:
      DOCKER_USERNAME: ${{ secrets.OLIVIA_DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.OLIVIA_DOCKER_PASSWORD }}
