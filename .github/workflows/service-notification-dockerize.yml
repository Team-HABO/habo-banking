name: Service Notification Dockerize
on:
  workflow_call:
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.BRIAN_DOCKER_USERNAME }}
          password: ${{ secrets.BRIAN_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/service-notification
          push: true
          tags: |
            docker.io/forkeh/habo-bank-service-notification:latest
            docker.io/forkeh/habo-bank-service-notification:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max