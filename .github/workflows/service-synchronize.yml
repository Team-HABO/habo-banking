name: Synchronize Service CI

permissions:
  pull-requests: write

on:
  push:
      paths:
        - "services/service-synchronize/**"
        - ".github/workflows/service-synchronize.yml"
        - ".github/workflows/service-synchronize-tests.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "services/service-synchronize/**"
      - ".github/workflows/service-synchronize.yml"
      - ".github/workflows/service-synchronize-tests.yml"
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/service-synchronize-tests.yml
