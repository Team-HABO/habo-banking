name: Synchronize Service CI/CD

permissions:
  pull-requests: write

on:
  push:
      paths:
        - "services/service-synchronize/**"
        - ".github/workflows/service-synchronize.yml"
        - ".github/workflows/service-synchronize-tests.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "services/service-synchronize/**"
      - ".github/workflows/service-synchronize.yml"
      - ".github/workflows/service-synchronize-tests.yml"
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/service-synchronize-tests.yml
  dockerize:
    needs: run-tests
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/dockerize.yml
    with:
      docker-image-name: service-synchronize
    secrets:
      DOCKER_USERNAME: ${{ secrets.OLIVIA_DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.OLIVIA_DOCKER_PASSWORD }}
