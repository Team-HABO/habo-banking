services:
  service-auth:
    image: service-auth
    build:
      context: ./service-auth
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${AuthServicePort:-8080}:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        

  frontend:
    image: frontend
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - service-auth



