services:
  service-auth:
    container_name: service-auth
    build:
      context: ./service-auth
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "${AuthServicePort:-8080}:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      shared:
        aliases:
          - auth-service

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK_NAME:-authservicemock_shared}