services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try {
          if (rs.status().ok) {
            quit(0);
          }
        } catch (e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
          quit(1);
        }"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  service-view:
    image: service-view
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/HABO_DB?replicaSet=rs0&directConnection=true
    ports:
      - "4000:4000"
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mongodb-data: