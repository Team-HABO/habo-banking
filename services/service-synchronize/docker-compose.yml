services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try {
          if (rs.status().ok) {
            quit(0);
          }
        } catch (e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
          quit(1);
        }"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:4-management-alpine
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  service-synchronize:
    image: service-synchronize
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    working_dir: /src
    command:
      ["dotnet", "watch", "run", "--project", "service-synchronize.csproj"]
    environment:
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./service-synchronize:/src
      - synchronize-bin:/src/bin
      - synchronize-obj:/src/obj
      - synchronize-nuget:/root/.nuget/packages
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mongodb-data:
  rabbitmq-data:
  synchronize-bin:
  synchronize-obj:
  synchronize-nuget:
