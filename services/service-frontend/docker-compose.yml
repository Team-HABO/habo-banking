services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AUTH_API_URL: ${AuthServiceUrl}
        VITE_ACCOUNT_API_URL: ${AccountServiceUrl}
        VITE_VIEW_API_URL: ${ViewServiceUrl}
    ports:
      - "80:80"
    volumes:
      - .:/app
      - /app/node_modules
